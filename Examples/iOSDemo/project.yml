# iOS demo project, generated with XcodeGen:
#     cd Examples/iOSDemo && xcodegen generate
# The generated project (iOSDemo.xcodeproj) is committed, so xcodegen is
# only needed when this file changes.
name: iOSDemo
options:
  bundleIdPrefix: com.voltasdk.demo
  deploymentTarget:
    iOS: "26.0"
packages:
  VoltaSDK:
    path: ../..
targets:
  iOSDemo:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: VoltaSDK
        product: VoltaSDKDemoUI
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.voltasdk.demo.ios
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: J6HPZ958W6
        # ── Private Cloud Compute: OPT-IN ─────────────────────────────────
        # Left unwired so this demo builds for everyone (on iOS 27, PCC shows
        # "unavailable" and the chain falls back to on-device). To exercise
        # LIVE PCC: request the entitlement from Apple (see ../../README.md),
        # set your own DEVELOPMENT_TEAM above, then either add the "Private
        # Cloud Compute" capability in Xcode (Signing & Capabilities) or
        # uncomment the next line and re-run `xcodegen generate`:
        # CODE_SIGN_ENTITLEMENTS: iOSDemo.entitlements
schemes:
  iOSDemo:
    build:
      targets:
        iOSDemo: all
    run:
      config: Debug
