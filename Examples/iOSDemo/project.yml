# iOS demo project, generated with XcodeGen:
#     cd Examples/iOSDemo && xcodegen generate
# The generated project (iOSDemo.xcodeproj) is committed, so xcodegen is
# only needed when this file changes.
name: iOSDemo
options:
  bundleIdPrefix: com.aiproviderkit.demo
  deploymentTarget:
    iOS: "26.0"
packages:
  AIProviderKit:
    path: ../..
targets:
  iOSDemo:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: AIProviderKit
        product: AIProviderKitDemoUI
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.aiproviderkit.demo.ios
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: J6HPZ958W6
schemes:
  iOSDemo:
    build:
      targets:
        iOSDemo: all
    run:
      config: Debug
